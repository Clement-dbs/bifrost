<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Bifrost</title>
</head>

<body class="grid-bg min-h-screen">

<!-- HEADER -->
<header class="relative sticky top-0 z-50 border-b border-white/5" style="background: rgba(10,10,15,.85); backdrop-filter: blur(16px);">
    <div class="max-w-7xl mx-auto px-6 h-14 flex items-center gap-8">
        <div class="flex items-center gap-2.5 mr-4">
            <div class="w-7 h-7 rounded-lg flex items-center justify-center text-sm" style="background: linear-gradient(135deg,#6C63FF,#38BDF8)">🌈</div>
            <span class="font-display font-700 text-base tracking-tight bifrost-text">Bifrost</span>
        </div>
        <nav class="flex gap-6">
            <a class="nav-link active text-sm text-mist cursor-pointer" data-tab="overview">Vue d'ensemble</a>
            <a class="nav-link text-sm text-mist cursor-pointer" data-tab="sources">Sources API</a>
            <a class="nav-link text-sm text-mist cursor-pointer" data-tab="planning">Planification</a>
        </nav>
        <div class="ml-auto flex items-center gap-3">
            <div class="flex items-center gap-1.5">
                <span class="w-1.5 h-1.5 rounded-full bg-jade animate-pulse"></span>
                <span class="text-xs text-mist" id="active-count">0 actives</span>
            </div>
            <button class="btn-primary text-sm px-4 py-1.5" id="btn-add-source">+ Source</button>
        </div>
    </div>
</header>

<!-- CONTENU DYNAMIQUE -->
<main class="max-w-7xl mx-auto px-6 py-8" id="app"></main>

<script src="tailwind_config.js"></script>
<script type="module" src="./router.js"></script>

</body>
</html>
