services:
  api:
    build: .
    container_name: bifrost-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data 
    command: bifrost start --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bifrost-frontend
    ports:
      - "3000:3000"
    depends_on:
      - api